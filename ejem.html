<!DOCTYPE html>

<!-- Indica al navegador que el documento está escrito en HTML5.
Es lo primero que debe ir siempre -->
✅

<html lang="es">
    <!-- lang="es" → indica que el idioma del contenido es español (importante para accesibilidad y SEO). -->
<head>
    <!-- Contiene información interna de la página (no visible directamente). -->
    <meta charset="UTF-8">
    <!-- Define la codificación de caracteres.
Permite usar letras como: ñ, á, é, í, ó, ú sin problemas. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0">

Hace que la página sea responsive (se adapte a celulares y tablets). -->
    <title>Document</title>
    <!-- Es el título de la página que aparece en la pestaña del navegador. -->
</head>
<body>
    <!-- Aquí va todo lo visible de tu página web. -->
    <ul>
        <!-- Significa "unordered list" (lista desordenada).
        Muestra una lista con viñetas (puntos). -->
    <li>Ejemplo 1</li>
        <!-- Significa "list item" (elemento de lista).
        Cada <li> es un elemento dentro de la lista. -->
    <li>Ejemplo 2</li>  
    <li>Ejemplo 3</li>
    </ul>
</body>
</html>
