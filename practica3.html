<!DOCTYPE html> <!-- Indica que el documento usa HTML5 -->

<html lang="en"> <!-- Etiqueta raíz de la página. "en" indica que el idioma es inglés -->

<head> <!-- Contiene información interna de la página (no visible) -->
    
    <meta charset="UTF-8"> <!-- Permite usar caracteres especiales como ñ, tildes, etc. -->
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página sea responsive (se adapte a celulares y tablets) -->
    
    <title>Document</title> <!-- Título que aparece en la pestaña del navegador -->

</head>

<body> <!-- Aquí va todo el contenido visible de la página -->

    <!-- titulos en html -->
    <!-- Los encabezados van desde h1 (más importante) hasta h6 (menos importante) -->

    <h1>titulo principal o de primer orden</h1> <!-- Título principal -->
    
    <h2>titulo de segundo orden</h2> <!-- Subtítulo -->
    
    <h3>titulo de tercer orden</h3> <!-- Subnivel -->
    
    <h4>titulo de cuarto orden</h4> <!-- Menor jerarquía -->
    
    <h5>titulo de quinto orden</h5> <!-- Aún menos importante -->
    
    <h6>titulo de sexto orden</h6> <!-- El título menos importante -->
    <a href="practica8.html">volver </a>
</body>

</html> <!-- Cierre del documento HTML -->
