<!DOCTYPE html> <!-- Indica que el documento usa HTML5 -->

<html lang="en"> <!-- Etiqueta principal de toda la página. "en" = idioma inglés -->

<head> <!-- Contiene configuración e información no visible -->
    
    <meta charset="UTF-8"> <!-- Permite usar caracteres especiales -->
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página se adapte a diferentes dispositivos -->
    
    <title>Document</title> <!-- Título que aparece en la pestaña -->

</head>

<body> <!-- Aquí va todo lo que el usuario ve -->

    <ul> <!-- Lista desordenada (con viñetas/puntos) -->
        
        <li>Elemento 1</li> <!-- Primer elemento de la lista -->
        
        <li>Elemento 2</li> <!-- Segundo elemento -->
        
        <li>Elemento 3</li> <!-- Tercer elemento -->
    
    </ul>

</body>

</html> <!-- Fin del documento -->
